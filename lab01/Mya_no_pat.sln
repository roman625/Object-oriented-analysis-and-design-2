    // БИЗНЕС-ЛОГИКА: Иерархия классов транспорта


    // Абстрактный базовый класс для всех типов транспорта
    // Определяет общий интерфейс и свойства
    public abstract class Transport
    {
        public int MaxWeight { get; protected set; }      // Максимальная грузоподъёмность
        public int CountWheel { get; protected set; }     // Количество колёс
        public int PassengerPlace { get; protected set; } // Количество пассажирских мест

        // Абстрактные методы — должны быть реализованы в наследниках
        public abstract string Move();                        // Описание движения
        public abstract string GetInfo();                     // Строка с информацией
        public abstract bool CanHandle(int weight, int distance, int passengers); // Проверка возможности перевозки
    }

    // Класс Велосипед
    public class Bicycle : Transport
    {
        public int CountSpeed { get; private set; } // Уникальное свойство: скорость

        public Bicycle()
        {
            // Инициализация характеристик велосипеда
            MaxWeight = 100;
            CountWheel = 2;
            PassengerPlace = 1;
            CountSpeed = 15;
        }

        public override string Move() => $"Велосипед двигается со скоростью {CountSpeed} км/ч";
        public override string GetInfo() => $"Велосипед: Макс. вес - {MaxWeight}кг, Места - {PassengerPlace}, Скорость - {CountSpeed} км/ч";

        // Логика проверки: подходит ли велосипед под заданные параметры
        public override bool CanHandle(int weight, int distance, int passengers) =>
            weight <= 50 && distance <= 20 && passengers <= 1;
    }

    // Класс Автомобиль
    public class Car : Transport
    {
        public int HorsePw { get; private set; } // Уникальное свойство: мощность

        public Car()
        {
            // Инициализация характеристик автомобиля
            MaxWeight = 2000;
            CountWheel = 4;
            PassengerPlace = 5;
            HorsePw = 150;
        }

        public override string Move() => $"Автомобиль двигается мощностью {HorsePw} л.с.";
        public override string GetInfo() => $"Автомобиль: Макс. вес - {MaxWeight}кг, Места - {PassengerPlace}, Мощность - {HorsePw} л.с.";

        // Логика проверки для автомобиля
        public override bool CanHandle(int weight, int distance, int passengers) =>
            weight <= 1500 && passengers <= 5;
    }

    // Класс Дрон (БПЛА)
    public class Drone : Transport
    {
        public bool CanFly { get; private set; }   // Флаг: способность летать
        public int MaxAltitude { get; private set; } // Уникальное свойство: макс. высота

        public Drone()
        {
            // Инициализация характеристик дрона
            MaxWeight = 10;
            CountWheel = 0;  // У дронов нет колёс в классическом понимании
            PassengerPlace = 0; // Дрон не перевозит людей
            CanFly = true;
            MaxAltitude = 500;
        }

        public override string Move() => $"Дрон летит на высоте до {MaxAltitude}м";
        public override string GetInfo() => $"Дрон: Макс. вес - {MaxWeight}кг, Полет - {CanFly}, Макс. высота - {MaxAltitude}м";

        // Логика проверки для дрона (только груз, без пассажиров)
        public override bool CanHandle(int weight, int distance, int passengers) =>
            weight <= 5 && distance <= 10 && passengers == 0;
    }


    // TransportSelector: Класс выбора транспорта
    // Упрощённая логика без использования Factory Method


    public class TransportSelector
    {
        private Transport _currentTransport; // Поле для хранения текущего выбранного объекта

        // Основной метод: возвращает подходящий транспорт по параметрам
        public Transport GetSelectedTransport(int weight, int distance, int passengers)
        {
            // Приоритет: дрон (если нет пассажиров и малый вес/расстояние)
            if (passengers == 0 && weight <= 5 && distance <= 10)
            {
                _currentTransport = new Drone();
            }
            // Велосипед: для лёгких грузов на короткие расстояния
            else if (passengers <= 1 && weight <= 50 && distance <= 20)
            {
                _currentTransport = new Bicycle();
            }
            // Автомобиль: для средних и тяжёлых грузов, до 5 пассажиров
            else if (passengers <= 5 && weight <= 1500)
            {
                _currentTransport = new Car();
            }
            // Если ни один вариант не подошёл
            else
            {
                _currentTransport = null;
            }

            return _currentTransport;
        }

        // Геттеры для доступа к специфичным свойствам текущего транспорта
        // Используют оператор ? и ?? для безопасной работы с null

        public Transport GetCurrentTransport() => _currentTransport;

        public int GetCountSpeed() => (_currentTransport as Bicycle)?.CountSpeed ?? 0;
        public int GetHorsePw() => (_currentTransport as Car)?.HorsePw ?? 0;
        public bool GetCanFly() => (_currentTransport as Drone)?.CanFly ?? false;
        public int GetMaxAltitude() => (_currentTransport as Drone)?.MaxAltitude ?? 0;
    }
