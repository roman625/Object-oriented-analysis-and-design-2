// --- ОБЫЧНЫЕ СТРУКТУРЫ (БЕЗ ПАТТЕРНОВ) ---
struct Person {
    std::string name, skill, position;
    double salary;
    Person(std::string n, std::string s, std::string p, double sal)
        : name(n), skill(s), position(p), salary(sal) {}
};

class Department {
public:
    std::string name;
    std::vector<Department> subDepts;
    std::vector<Person> staff;

    explicit Department(std::string n) : name(n) {}

    // Рекурсивный поиск отдела
    Department* findDept(const std::string& target) {
        if (this->name == target) return this;
        for (auto& d : subDepts) {
            Department* res = d.findDept(target);
            if (res) return res;
        }
        return nullptr;
    }

    // Счёт общего бюджета (рекурсивно)
    double getFullSalary() const {
        double total = 0;
        for (const auto& p : staff) total += p.salary;
        for (const auto& d : subDepts) total += d.getFullSalary();
        return total;
    }

    // Вывод структуры
    void print(std::ostringstream& oss, int indent) const {
        oss << std::string(indent * 2, ' ') << "Отдел: " << name << "\r\n";
        for (const auto& p : staff) {
            oss << std::string((indent + 1) * 2, ' ') << "Сотрудник: " << p.name
                << " [" << p.position << " / " << p.skill << "] - $" << (int)p.salary << "\r\n";
        }
        for (const auto& d : subDepts) d.print(oss, indent + 1);
    }

    // Поиск по навыку
    void findSkill(const std::string& s, std::vector<std::string>& found) const {
        std::string lowS = s; std::transform(lowS.begin(), lowS.end(), lowS.begin(), ::tolower);
        for (const auto& p : staff) {
            std::string pS = p.skill; std::transform(pS.begin(), pS.end(), pS.begin(), ::tolower);
            if (pS.find(lowS) != std::string::npos) found.push_back(p.name + " (" + name + ")");
        }
        for (const auto& d : subDepts) d.findSkill(s, found);
    }
};

// --- ГЛОБАЛЫ И GUI ---
Department rootCompany("Главный_Офис");
HWND hOut, hEditDept, hEditName, hEditSkill, hEditPos, hEditSal, hEditTarget;

std::wstring s2w(const std::string& s) {
    int len = MultiByteToWideChar(CP_UTF8, 0, s.c_str(), -1, NULL, 0);
    std::wstring res(len, 0);
    MultiByteToWideChar(CP_UTF8, 0, s.c_str(), -1, &res[0], len);
    return res;
}

std::string getT(HWND h) {
    wchar_t b[256]; GetWindowTextW(h, b, 256);
    int sz = WideCharToMultiByte(CP_UTF8, 0, b, -1, NULL, 0, NULL, NULL);
    if (sz <= 1) return "";
    std::string r(sz - 1, 0); WideCharToMultiByte(CP_UTF8, 0, b, -1, &r[0], sz, NULL, NULL);
    return r;
}

void log(const std::string& m) {
    std::wstring w = s2w(m + "\r\n");
    int len = GetWindowTextLengthW(hOut);
    SendMessageW(hOut, EM_SETSEL, len, len);
    SendMessageW(hOut, EM_REPLACESEL, 0, (LPARAM)w.c_str());
}

// --- ФУНКЦИИ КНОПОК ---
void onAdd() {
    std::string dName = getT(hEditDept);
    Department* target = rootCompany.findDept(dName);
    if (!target) { log("Ошибка: Отдел '" + dName + "' не найден!"); return; }

    double s = std::atof(getT(hEditSal).c_str());
    std::string n = getT(hEditName);
    if (s <= 0) {
        target->subDepts.push_back(Department(n));
        log("Создан подотдел '" + n + "' в '" + dName + "'");
    }
    else {
        target->staff.push_back(Person(n, getT(hEditSkill), getT(hEditPos), s));
        log("Добавлен сотрудник " + n + " в '" + dName + "'");
    }
}

void onDelete() {
    std::string delName = getT(hEditDept);
    std::string toName = getT(hEditTarget);
    if (delName == "Главный_Офис" || delName.empty()) return;

    Department* from = rootCompany.findDept(delName);
    Department* to = rootCompany.findDept(toName);

    if (from && to) {
        for (auto& p : from->staff) to->staff.push_back(p);
        for (auto& sd : from->subDepts) to->subDepts.push_back(sd);

        std::function<void(Department&)> rm = [&](Department& curr) {
            curr.subDepts.erase(std::remove_if(curr.subDepts.begin(), curr.subDepts.end(),
                [&](const Department& d) { return d.name == delName; }), curr.subDepts.end());
            for (auto& s : curr.subDepts) rm(s);
            };
        rm(rootCompany);
        log("Отдел '" + delName + "' удален. Всё перенесено в '" + toName + "'");
    }
    else log("Ошибка: Проверьте имена отделов!");
}

LRESULT CALLBACK Proc(HWND hw, UINT m, WPARAM wp, LPARAM lp) {
    switch (m) {
    case WM_CREATE: {
        hOut = CreateWindowExW(WS_EX_CLIENTEDGE, L"EDIT", L"", WS_CHILD | WS_VISIBLE | WS_VSCROLL | ES_MULTILINE | ES_READONLY | ES_AUTOVSCROLL, 10, 10, 610, 180, hw, NULL, NULL, NULL);
        auto cf = [&](const wchar_t* l, int x, int y, int w) {
            CreateWindowW(L"STATIC", l, WS_CHILD | WS_VISIBLE, x, y, w, 18, hw, NULL, NULL, NULL);
            return CreateWindowExW(WS_EX_CLIENTEDGE, L"EDIT", L"", WS_CHILD | WS_VISIBLE, x, y + 20, w - 10, 25, hw, NULL, NULL, NULL);
            };

        hEditDept = cf(L"Целевой Отдел:", 10, 200, 140);
        hEditName = cf(L"Имя / Назв.:", 160, 200, 140);
        hEditSkill = cf(L"Навык:", 310, 200, 100);
        hEditPos = cf(L"Пост:", 420, 200, 100);
        hEditSal = cf(L"ЗП (0=отдел):", 530, 200, 90);
        hEditTarget = cf(L"Куда переместить при удалении:", 10, 255, 300);

        CreateWindowW(L"BUTTON", L"Структура", WS_CHILD | WS_VISIBLE, 10, 310, 90, 30, hw, (HMENU)1, NULL, NULL);
        CreateWindowW(L"BUTTON", L"Бюджет", WS_CHILD | WS_VISIBLE, 105, 310, 90, 30, hw, (HMENU)2, NULL, NULL);
        CreateWindowW(L"BUTTON", L"Поиск", WS_CHILD | WS_VISIBLE, 200, 310, 90, 30, hw, (HMENU)3, NULL, NULL);
        CreateWindowW(L"BUTTON", L"Добавить", WS_CHILD | WS_VISIBLE, 295, 310, 100, 30, hw, (HMENU)4, NULL, NULL);
        CreateWindowW(L"BUTTON", L"Удалить", WS_CHILD | WS_VISIBLE, 400, 310, 100, 30, hw, (HMENU)5, NULL, NULL);
        CreateWindowW(L"BUTTON", L"Помощь", WS_CHILD | WS_VISIBLE, 505, 310, 115, 30, hw, (HMENU)6, NULL, NULL);

        // Инициализация "родненьких"
        Department it("IT_Департамент");
        Department dev("Разработка");
        dev.staff.push_back(Person("Виктор", "C++", "Senior", 5000));
        dev.staff.push_back(Person("Анна", "Python", "Middle", 4000));
        it.subDepts.push_back(dev);
        it.subDepts.push_back(Department("QA"));
        it.subDepts.back().staff.push_back(Person("Денис", "Testing", "Junior", 2500));
        rootCompany.subDepts.push_back(it);
        rootCompany.staff.push_back(Person("Босс", "Management", "CEO", 15000));

        log("Система готова. Все функции доступны.");
        break;
    }
    case WM_COMMAND: {
        int id = LOWORD(wp);
        if (id == 1) { std::ostringstream os; rootCompany.print(os, 0); log(os.str()); }
        else if (id == 2) { log("Общий бюджет компании: $" + std::to_string((int)rootCompany.getFullSalary())); }
        else if (id == 3) {
            std::vector<std::string> f; rootCompany.findSkill(getT(hEditSkill), f);
            log("Найдено: " + std::to_string(f.size()));
            for (auto& n : f) log("- " + n);
        }
        else if (id == 4) onAdd();
        else if (id == 5) onDelete();
        else if (id == 6) {
            log("=== ПОДСКАЗКИ ПО КОМАНДАМ ===");
            log("1. Добавление отдела:");
            log("   - Целевой отдел: [Имя существующего родителя]");
            log("   - Имя: [Название нового отдела]");
            log("   - ЗП: 0 (Обязательно)");
            log("   Пример: Главный_Офис -> Логистика -> 0");
            log("");
            log("2. Добавление сотрудника:");
            log("   - Целевой отдел: [Имя отдела]");
            log("   - Имя: [ФИО], Навык: [C++], Должность: [Dev]");
            log("   - ЗП: [Число > 0]");
            log("   Пример: Разработка -> Иван -> C++ -> Middle -> 3000");
            log("");
            log("3. Удаление с переносом:");
            log("   - Целевой отдел: [Кого удаляем]");
            log("   - Куда переместить: [Кто примет штат]");
            log("   Пример: QA -> Разработка (QA удалится, люди уйдут в Разработку)");
            log("");
            log("4. Поиск:");
            log("   - Навык: [Что ищем]");
            log("   Пример: Введите 'Python' и нажмите Поиск.");
            log("=============================");
        }
        break;
    }
    case WM_DESTROY: PostQuitMessage(0); break;
    }
    return DefWindowProcW(hw, m, wp, lp);
}

int WINAPI wWinMain(HINSTANCE h, HINSTANCE, LPWSTR, int n) {
    WNDCLASSEXW wc = { sizeof(wc), CS_HREDRAW | CS_VREDRAW, Proc, 0, 0, h, NULL, LoadCursor(NULL, IDC_ARROW), (HBRUSH)6, NULL, L"HR_APP", NULL };
    RegisterClassExW(&wc);
    HWND hw = CreateWindowExW(0, L"HR_APP", L"HR System v5.0 (No Pattern)", WS_OVERLAPPEDWINDOW, CW_USEDEFAULT, CW_USEDEFAULT, 650, 400, NULL, NULL, h, NULL);
    ShowWindow(hw, n);
    MSG g; while (GetMessage(&g, NULL, 0, 0)) { TranslateMessage(&g); DispatchMessage(&g); }
    return 0;
}
