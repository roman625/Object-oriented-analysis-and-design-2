    private Label lblDistance;
    private Label lblPassengers;

    // Поля ввода числовых значений с ограничением диапазона
    private NumericUpDown nudWeight;     // Вес груза (кг)
    private NumericUpDown nudDistance;   // Расстояние (км)
    private NumericUpDown nudPassengers; // Количество пассажиров

