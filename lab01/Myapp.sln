        InitializeComponent();
        _userTab = new UserTab();
        SetupTooltips();

        // Включаем двойную буферизацию для плавной отрисовки
        this.SetStyle(ControlStyles.DoubleBuffer |
                      ControlStyles.UserPaint |
                      ControlStyles.AllPaintingInWmPaint, true);
        this.UpdateStyles();
    }

    private void SetupTooltips()
    {
        ToolTip tt = new ToolTip();
        tt.SetToolTip(nudWeight, "Максимальный вес груза в килограммах");
        tt.SetToolTip(nudDistance, "Расстояние доставки в километрах");
        tt.SetToolTip(nudPassengers, "Количество пассажиров (0 для дрона)");
    }

    private void btnFind_Click(object sender, EventArgs e)
    {
        try
        {
            int weight = (int)nudWeight.Value;
            int distance = (int)nudDistance.Value;
            int passengers = (int)nudPassengers.Value;

            var transport = _userTab.GetSelectedTransport(weight, distance, passengers);

            if (transport != null)
            {
                DisplaySuccess(transport);
            }
            else
            {
                DisplayError();
            }
        }
        catch (Exception ex)
        {
            MessageBox.Show($"Ошибка: {ex.Message}", "Внимание",
                MessageBoxButtons.OK, MessageBoxIcon.Warning);
        }
    }

    private void DisplaySuccess(Transport t)
    {
        grpResult.BackColor = Color.White;
        lblTransportName.Text = GetTransportTitle(t);
        picTransport.Image = GetTransportIcon(t);
        lblInfo.Text = t.GetInfo();
        lblMove.Text = "> " + t.Move();

        string specs = $"- Колёса: {t.CountWheel}\n" +
                      $"- Места: {t.PassengerPlace}";

        if (t is Bicycle)
            specs += $"\n- Скорость: {_userTab.GetCountSpeed()} км/ч";
        else if (t is Car)
            specs += $"\n- Мощность: {_userTab.GetHorsePw()} л.с.";
        else if (t is Drone)
            specs += $"\n- Полёт: {_userTab.GetCanFly()} (до {_userTab.GetMaxAltitude()}м)";

        lblSpecs.Text = specs;
    }

    private void DisplayError()
    {
        grpResult.BackColor = Color.FromArgb(255, 240, 240);
        lblTransportName.Text = "Не найдено";
        lblTransportName.ForeColor = Color.Red;
        picTransport.Image = CreatePlaceholderImage();
        lblInfo.Text = "Для указанных параметров нет подходящего транспорта.";
        lblMove.Text = "Попробуйте уменьшить вес, расстояние или количество пассажиров.";
        lblSpecs.Text = "";
    }

    private string GetTransportTitle(Transport t)
    {
        if (t is Bicycle) return "Велосипед";
        if (t is Car) return "Автомобиль";
        if (t is Drone) return "Дрон";
        return "Транспорт";
    }

    private Image GetTransportIcon(Transport t)
    {
        try
        {
            if (t is Bicycle)
            {
                return LoadImageFromUrl("https://avatars.mds.yandex.net/get-mpic/4912684/img_id6076608866905841757.jpeg/orig");
            }
            else if (t is Car)
            {
                return LoadImageFromUrl("https://avatars.mds.yandex.net/i?id=3984ae4829f64506f6c086588453c237_l-10265017-images-thumbs&n=13");
            }
            else if (t is Drone)
            {
                return LoadImageFromUrl("https://avatars.mds.yandex.net/i?id=a3257a4ee29d500bf5f9ecdd1ec2acdf15f61140-8199312-images-thumbs&n=13");
//return LoadImageFromUrl("https://avatars.mds.yandex.net/i?id=c8af371cebc95fe33c191e36437b4778a211d3fe-4271045-images-thumbs&n=13");
            }
        }
        catch
        {
            // Если не загрузились, возвращаем заглушку
        }

        return CreatePlaceholderImage();
    }

    private Image LoadImageFromUrl(string url)
    {
        using (WebClient client = new WebClient())
        {
            client.Headers.Add("user-agent", "Mozilla/5.0");
            byte[] data = client.DownloadData(url);
            using (MemoryStream ms = new MemoryStream(data))
            {
                return new Bitmap(ms);
            }
        }
    }

    private Image CreatePlaceholderImage()
    {
        Bitmap bmp = new Bitmap(90, 90);
        using (Graphics g = Graphics.FromImage(bmp))
        {
            g.Clear(Color.White);
            g.SmoothingMode = SmoothingMode.AntiAlias;
            g.DrawString("?", new Font("Arial", 40, FontStyle.Bold),
                         Brushes.DarkGray, new PointF(25, 15));
        }
        return bmp;
    }

