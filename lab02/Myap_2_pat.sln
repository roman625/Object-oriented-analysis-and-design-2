#pragma execution_character_set("utf-8")
#define WIN32_LEAN_AND_MEAN
#include <windows.h>
#include <commctrl.h>
#include <iostream>
#include <vector>
#include <string>
#include <memory>
#include <algorithm>
#include <iomanip>
#include <sstream>

#pragma comment(lib, "comctl32.lib")

using EmployeePtr = std::shared_ptr<class Employee>;
using EmployeeList = std::vector<EmployeePtr>;

class Department;

// --- COMPONENT (Интерфейс) ---
class Employee {
public:
    virtual ~Employee() = default;
    virtual double getSalary() const = 0;
    virtual double getTotalCost() const = 0;
    virtual EmployeeList findEmployeesBySkill(const std::string& skill) const = 0;
    virtual std::string getName() const = 0;
    virtual void add(EmployeePtr employee) = 0;
    virtual void printStructure(std::ostringstream& oss, int indent = 0) const = 0;
    virtual void printBudgetReport(std::ostringstream& oss, int indent = 0) const = 0;
    virtual Department* findDepartment(const std::string& name) const = 0;
};

// --- LEAF (Сотрудник) ---
class Person : public Employee, public std::enable_shared_from_this<Person> {
private:
    std::string name_, skill_, position_;
    double salary_;

public:
    Person(const std::string& n, const std::string& s, const std::string& p, double sal)
        : name_(n), skill_(s), position_(p), salary_(sal) {}

    double getSalary() const override { return salary_; }
    double getTotalCost() const override { return salary_; }
    std::string getName() const override { return name_; }

    EmployeeList findEmployeesBySkill(const std::string& skill) const override {
        EmployeeList result;
        auto toLower = [](std::string s) {
            std::transform(s.begin(), s.end(), s.begin(), ::tolower);
            return s;
            };
        if (toLower(skill_).find(toLower(skill)) != std::string::npos) {
            result.push_back(const_cast<Person*>(this)->shared_from_this());
        }
        return result;
    }

    void add(EmployeePtr) override {} // У листа нет детей

    void printStructure(std::ostringstream& oss, int indent = 0) const override {
        oss << std::string(indent * 2, ' ') << "Сотрудник: " << name_
            << " [" << position_ << "] Навык: " << skill_ << " | $" << salary_ << "\r\n";
    }

    void printBudgetReport(std::ostringstream&, int) const override {} // Бюджет сотрудника считает отдел

    Department* findDepartment(const std::string&) const override { return nullptr; }
};

// --- COMPOSITE (Отдел) ---
class Department : public Employee, public std::enable_shared_from_this<Department> {
private:
    std::string name_;
    EmployeeList employees_;

public:
    explicit Department(const std::string& n) : name_(n) {}

    double getSalary() const override {
        double total = 0;
        for (const auto& e : employees_) total += e->getSalary();
        return total;
    }

    double getTotalCost() const override { return getSalary(); }
    std::string getName() const override { return name_; }

    void add(EmployeePtr e) override { if (e) employees_.push_back(e); }

    EmployeeList findEmployeesBySkill(const std::string& skill) const override {
        EmployeeList result;
        for (const auto& e : employees_) {
            auto found = e->findEmployeesBySkill(skill);
            result.insert(result.end(), found.begin(), found.end());
        }
        return result;
    }

    void printStructure(std::ostringstream& oss, int indent = 0) const override {
        oss << std::string(indent * 2, ' ') << "Отдел: " << name_ << "\r\n";
        for (const auto& e : employees_) e->printStructure(oss, indent + 1);
    }

    void printBudgetReport(std::ostringstream& oss, int indent = 0) const override {
        oss << std::fixed << std::setprecision(2);
        oss << std::string(indent * 2, ' ') << "Бюджет отдела '" << name_ << "': $" << getSalary() << "\r\n";
        for (const auto& e : employees_) e->printBudgetReport(oss, indent + 1);
    }

    Department* findDepartment(const std::string& name) const override {
        auto toLower = [](std::string s) {
            std::transform(s.begin(), s.end(), s.begin(), ::tolower);
            return s;
            };
        if (toLower(name_).find(toLower(name)) != std::string::npos) return const_cast<Department*>(this);
        for (const auto& e : employees_) {
            Department* found = e->findDepartment(name);
            if (found) return found;
        }
        return nullptr;
    }
};

// --- LOGIC ---
EmployeePtr company;
HWND hOutput, hInput;

std::string processCommand(const std::string& cmd, const std::string& param = "") {
    std::ostringstream oss;
    if (cmd == "structure") {
        oss << "\r\n--- ПОЛНАЯ СТРУКТУРА ОРГАНИЗАЦИИ ---\r\n";
        company->printStructure(oss);
    }
    else if (cmd == "budget") {
        oss << "\r\n--- ДЕТАЛЬНЫЙ ФИНАНСОВЫЙ ОТЧЕТ ---\r\n";
        company->printBudgetReport(oss);
        oss << "--------------------------------------------\r\n";
        oss << "ОБЩИЕ ЗАТРАТЫ КОМПАНИИ: $" << std::fixed << std::setprecision(2) << company->getSalary() << "\r\n";
    }
    else if (cmd == "add") {
        std::istringstream iss(param);
        std::string dName, name, skill, pos;
        double sal = -1;
        if (!(iss >> dName >> name >> skill >> pos >> sal)) return "Ошибка! Формат: [Отдел] [Имя] [Скилл] [Должность] [ЗП]\r\n";

        auto target = company->findDepartment(dName);
        if (target) {
            if (sal == 0) {
                target->add(std::make_shared<Department>(name));
                oss << "Успех: Создан новый подотдел '" << name << "'\r\n";
            }
            else {
                target->add(std::make_shared<Person>(name, skill, pos, sal));
                oss << "Успех: Добавлен сотрудник " << name << " в отдел " << target->getName() << "\r\n";
            }
        }
        else oss << "Ошибка: Отдел '" << dName << "' не найден.\r\n";
    }
    else if (cmd == "find") {
        auto found = company->findEmployeesBySkill(param);
        oss << "\r\nПоиск по навыку '" << param << "': найдено " << found.size() << "\r\n";
        for (auto& e : found) oss << " - " << e->getName() << "\r\n";
    }
    else if (cmd == "help") {
        oss << "\r\n--- СПРАВКА ---\r\n"
            << "Структура - Дерево организации\r\n"
            << "Бюджет - Затраты по каждому отделу\r\n"
            << "Добавить - [Отдел] [Имя] [Навык] [Поз] [ЗП]\r\n"
            << "   (ЗП = 0 создаст новый отдел)\r\n"
            << "   Пример: Маркетинг Реклама - - 0\r\n";
    }
    return oss.str();
}

std::wstring s2w(const std::string& s) {
    int len = MultiByteToWideChar(CP_UTF8, 0, s.c_str(), -1, NULL, 0);
    std::wstring res(len, 0);
    MultiByteToWideChar(CP_UTF8, 0, s.c_str(), -1, &res[0], len);
    return res;
}

LRESULT CALLBACK WindowProc(HWND hwnd, UINT uMsg, WPARAM wParam, LPARAM lParam) {
    switch (uMsg) {
    case WM_CREATE: {
        hOutput = CreateWindowExW(WS_EX_CLIENTEDGE, L"EDIT", L"", WS_CHILD | WS_VISIBLE | WS_VSCROLL | ES_MULTILINE | ES_READONLY | ES_AUTOVSCROLL, 10, 10, 560, 280, hwnd, NULL, NULL, NULL);
        hInput = CreateWindowExW(WS_EX_CLIENTEDGE, L"EDIT", L"", WS_CHILD | WS_VISIBLE | ES_AUTOHSCROLL, 10, 300, 400, 25, hwnd, NULL, NULL, NULL);
        for (int i = 0; i < 5; i++) {
            const wchar_t* lbl[] = { L"Структура", L"Бюджет", L"Поиск", L"Добавить", L"Помощь" };
            CreateWindowW(L"BUTTON", lbl[i], WS_CHILD | WS_VISIBLE, 10 + i * 110, 340, 100, 30, hwnd, (HMENU)(UINT_PTR)(i + 1), NULL, NULL);
        }

        // --- ИНИЦИАЛИЗАЦИЯ ПОЛНЫХ ДАННЫХ ---
        company = std::make_shared<Department>("Главный_Офис");

        // IT
        auto itDept = std::make_shared<Department>("IT_Департамент");
        auto dev = std::make_shared<Department>("Разработка");
        dev->add(std::make_shared<Person>("Виктор", "C++", "Senior", 5000));
        dev->add(std::make_shared<Person>("Анна", "Python", "Middle", 4000));
        auto qa = std::make_shared<Department>("QA");
        qa->add(std::make_shared<Person>("Денис", "Testing", "Junior", 2500));
        itDept->add(dev);
        itDept->add(qa);

        // Дизайн
        auto design = std::make_shared<Department>("Дизайн_Студия");
        design->add(std::make_shared<Person>("Мария", "Figma", "Lead", 4500));

        // Маркетинг
        auto market = std::make_shared<Department>("Маркетинг");
        market->add(std::make_shared<Person>("Игорь", "SEO", "Manager", 3000));

        company->add(itDept);
        company->add(design);
        company->add(market);
        company->add(std::make_shared<Person>("Босс", "Management", "CEO", 15000));

        SetWindowTextW(hOutput, L"Организационная система готова.\r\nНажмите 'Бюджет' для детального отчета.");
        break;
    }
    case WM_COMMAND: {
        int id = LOWORD(wParam);
        wchar_t buf[512] = L""; GetWindowTextW(hInput, buf, 512);
        std::string param;
        int sz = WideCharToMultiByte(CP_UTF8, 0, buf, -1, NULL, 0, NULL, NULL);
        if (sz > 1) { param.resize(sz - 1); WideCharToMultiByte(CP_UTF8, 0, buf, -1, &param[0], sz, NULL, NULL); }

        std::string res;
        if (id == 1) res = processCommand("structure");
        else if (id == 2) res = processCommand("budget");
        else if (id == 3) res = processCommand("find", param);
        else if (id == 4) res = processCommand("add", param);
        else if (id == 5) res = processCommand("help");

        if (!res.empty()) {
            std::wstring wres = s2w(res + "\r\n");
            int len = GetWindowTextLengthW(hOutput);
            SendMessageW(hOutput, EM_SETSEL, len, len);
            SendMessageW(hOutput, EM_REPLACESEL, 0, (LPARAM)wres.c_str());
            SendMessageW(hOutput, EM_SCROLLCARET, 0, 0);
        }
        break;
    }
    case WM_DESTROY: PostQuitMessage(0); return 0;
    }
    return DefWindowProcW(hwnd, uMsg, wParam, lParam);
}

int WINAPI wWinMain(HINSTANCE h, HINSTANCE, LPWSTR, int n) {
    WNDCLASSEXW wc = { sizeof(WNDCLASSEXW), CS_HREDRAW | CS_VREDRAW, WindowProc, 0, 0, h, NULL, LoadCursor(NULL, IDC_ARROW), (HBRUSH)(COLOR_WINDOW + 1), NULL, L"OrgClass", NULL };
    RegisterClassExW(&wc);
    HWND hwnd = CreateWindowExW(0, L"OrgClass", L"Система управления (Composite)", WS_OVERLAPPEDWINDOW, CW_USEDEFAULT, CW_USEDEFAULT, 620, 450, NULL, NULL, h, NULL);
    ShowWindow(hwnd, n);
    MSG msg; while (GetMessage(&msg, NULL, 0, 0)) { TranslateMessage(&msg); DispatchMessage(&msg); }
    return (int)msg.wParam;
}
