// Типы для умных указателей и списков сотрудников
using EmployeePtr = std::shared_ptr<class Employee>;
using EmployeeList = std::vector<EmployeePtr>;

// Предварительное объявление отдела
class Department;

// Базовый интерфейс для всех элементов организации
class Employee {
public:
    virtual ~Employee() = default;
    virtual double getSalary() const = 0;
    virtual double getTotalCost() const = 0;
    virtual EmployeeList findEmployeesBySkill(const std::string& skill) const = 0;
    virtual std::string getName() const = 0;
    virtual std::string getSkill() const = 0;
    virtual std::string getPosition() const = 0;
    virtual void add(EmployeePtr employee) = 0;
    virtual void remove(EmployeePtr employee) = 0;
    virtual void printStructure(std::ostringstream& oss, int indent = 0) const = 0;
    virtual bool isDepartment() const = 0;
    virtual Department* findDepartment(const std::string& name) = 0;
};

// Класс сотрудника (лист в паттерне Composite)
class Person : public Employee, public std::enable_shared_from_this<Person> {
private:
    std::string name_;
    std::string skill_;
    std::string position_;
    double salary_;

    // Приведение строки к нижнему регистру для поиска
    static std::string toLower(std::string str) {
        for (auto& c : str)
            c = std::tolower(static_cast<unsigned char>(c));
        return str;
    }

public:
    Person(const std::string& name, const std::string& skill,
        const std::string& position, double salary)
        : name_(name), skill_(skill), position_(position), salary_(salary) {}

    double getSalary() const override { return salary_; }
    double getTotalCost() const override { return salary_; }

    // Поиск по навыку - проверяем себя
    EmployeeList findEmployeesBySkill(const std::string& skill) const override {
        EmployeeList result;
        if (toLower(skill_) == toLower(skill)) {
            result.push_back(std::static_pointer_cast<Employee>(
                const_cast<Person*>(this)->shared_from_this()));
        }
        return result;
    }

    std::string getName() const override { return name_; }
    std::string getSkill() const override { return skill_; }
    std::string getPosition() const override { return position_; }

    // Сотрудник не может иметь подчинённых
    void add(EmployeePtr) override {}
    void remove(EmployeePtr) override {}

    // Вывод информации о сотруднике
    void printStructure(std::ostringstream& oss, int indent = 0) const override {
        std::string prefix(indent * 2, ' ');
        oss << prefix << "Сотрудник: " << name_
            << " | " << position_ << " | " << skill_
            << " | $" << getTotalCost() << "\r\n";
    }

    bool isDepartment() const override { return false; }
    Department* findDepartment(const std::string&) override { return nullptr; }
};

// Класс отдела (компоновщик в паттерне Composite)
class Department : public Employee, public std::enable_shared_from_this<Department> {
private:
    std::string name_;
    std::string position_;
    EmployeeList employees_;

    static std::string toLower(std::string str) {
        for (auto& c : str) c = std::tolower(static_cast<unsigned char>(c));
        return str;
    }

public:
    explicit Department(const std::string& name)
        : name_(name), position_("Руководитель отдела") {}

    // Сумма зарплат всех сотрудников отдела
    double getSalary() const override {
        double total = 0.0;
        for (const auto& emp : employees_) total += emp->getSalary();
        return total;
    }

    // Общая стоимость с учётом вложенных отделов
    double getTotalCost() const override {
        double total = 0.0;
        for (const auto& emp : employees_) total += emp->getTotalCost();
        return total;
    }

    // Рекурсивный поиск по всем сотрудникам
    EmployeeList findEmployeesBySkill(const std::string& skill) const override {
        EmployeeList result;
        for (const auto& emp : employees_) {
            auto found = emp->findEmployeesBySkill(skill);
            result.insert(result.end(), found.begin(), found.end());
        }
        return result;
    }

    std::string getName() const override { return name_; }
    std::string getSkill() const override { return "N/A"; }
    std::string getPosition() const override { return position_; }

    // Добавление сотрудника в отдел
    void add(EmployeePtr employee) override {
        employees_.push_back(employee);
    }

    // Удаление сотрудника из отдела
    void remove(EmployeePtr employee) override {
        auto it = std::find(employees_.begin(), employees_.end(), employee);
        if (it != employees_.end()) employees_.erase(it);
    }

    // Вывод структуры отдела с отступами
    void printStructure(std::ostringstream& oss, int indent = 0) const override {
        std::string prefix(indent * 2, ' ');
        oss << prefix << "Отдел: " << name_
            << " (Бюджет: $" << getTotalCost() << ")\r\n";
        for (const auto& emp : employees_)
            emp->printStructure(oss, indent + 1);
    }

    bool isDepartment() const override { return true; }
    const EmployeeList& getEmployees() const { return employees_; }

    // Поиск отдела по названию (частичное совпадение)
    Department* findDepartment(const std::string& name) override {
        std::string searchName = toLower(name);

        if (toLower(name_) == searchName) return this;
        if (toLower(name_).find(searchName) != std::string::npos) return this;

        for (const auto& emp : employees_) {
            if (emp->isDepartment()) {
                Department* dept = dynamic_cast<Department*>(emp.get());
                if (dept) {
                    Department* found = dept->findDepartment(name);
                    if (found) return found;
                }
            }
        }
        return nullptr;
    }
};

// Глобальные переменные
EmployeePtr company;
HWND hOutput;
HWND hInput;

// Обработка команд от кнопок
std::string processCommand(const std::string& cmd, const std::string& param = "") {
    std::ostringstream oss;

    if (cmd == "structure") {
        company->printStructure(oss);
    }
    else if (cmd == "budget") {
        oss << std::fixed << std::setprecision(2);
        oss << "\r\nБюджет компании: $" << company->getSalary() << "\r\n";
        oss << "Полная стоимость: $" << company->getTotalCost() << "\r\n";
    }
    else if (cmd == "find") {
        if (param.empty()) {
            return "Введите навык в поле ввода и нажмите Поиск\r\n";
        }
        auto found = company->findEmployeesBySkill(param);
        oss << "\r\nНайдено " << found.size()
            << " сотрудников с навыком \"" << param << "\":\r\n";
        for (const auto& emp : found) {
            oss << "  - " << emp->getName()
                << " (" << emp->getPosition() << ")\r\n";
        }
    }
    else if (cmd == "add") {
        if (param.empty()) {
            return "Формат: <отдел> <имя> <навык> <должность> <зарплата>\r\n";
        }
        std::istringstream iss(param);
        std::string deptName, name, skill, position;
        double salary;
        iss >> deptName >> name >> skill >> position >> salary;
        if (deptName.empty() || name.empty()) {
            return "Формат: <отдел> <имя> <навык> <должность> <зарплата>\r\n";
        }
        Department* dept = dynamic_cast<Department*>(company.get())->findDepartment(deptName);
        if (dept) {
            auto emp = std::make_shared<Person>(name, skill, position, salary);
            dept->add(emp);
            oss << "\r\nДобавлен " << name << " в отдел " << dept->getName() << "\r\n";
        }
        else {
            oss << "Отдел \"" << deptName << "\" не найден!\r\n";
        }
    }
    else if (cmd == "help") {
        oss << "\r\nКНОПКИ:\r\n";
        oss << "  Структура - показать структуру компании\r\n";
        oss << "  Бюджет - показать бюджеты\r\n";
        oss << "  Поиск - найти сотрудников по навыку\r\n";
        oss << "  Добавить - добавить сотрудника\r\n";
        oss << "  Помощь - эта справка\r\n";
        oss << "\r\nДля Поиска и Добавить\r\n";
        oss << "введите данные в поле ввода.\r\n";
    }
    else {
        return "Нажмите кнопку для выполнения действия.\r\n";
    }
    return oss.str();
}

// Конвертация строки в широкий формат для Windows API
std::wstring stringToWide(const std::string& str) {
    if (str.empty()) return L"";
    int size_needed = MultiByteToWideChar(CP_UTF8, 0, str.c_str(), -1, NULL, 0);
    std::wstring wstr(size_needed, 0);
    MultiByteToWideChar(CP_UTF8, 0, str.c_str(), -1, &wstr[0], size_needed);
    return wstr;
}

// Обработчик событий окна
LRESULT CALLBACK WindowProc(HWND hwnd, UINT uMsg, WPARAM wParam, LPARAM lParam) {
    switch (uMsg) {
    case WM_CREATE: {
        // Поле вывода результатов
        hOutput = CreateWindowExW(WS_EX_CLIENTEDGE, L"EDIT", L"",
            WS_CHILD | WS_VISIBLE | WS_VSCROLL | ES_MULTILINE |
            ES_READONLY | WS_HSCROLL | ES_AUTOVSCROLL,
            10, 10, 560, 280, hwnd, NULL, NULL, NULL);

        // Поле ввода данных
        hInput = CreateWindowExW(WS_EX_CLIENTEDGE, L"EDIT", L"",
            WS_CHILD | WS_VISIBLE | ES_AUTOHSCROLL,
            10, 300, 400, 25, hwnd, NULL, NULL, NULL);

        // Создание кнопок
        CreateWindowW(L"BUTTON", L"Структура",
            WS_CHILD | WS_VISIBLE | BS_PUSHBUTTON,
            10, 340, 90, 30, hwnd, (HMENU)1, NULL, NULL);

        CreateWindowW(L"BUTTON", L"Бюджет",
            WS_CHILD | WS_VISIBLE | BS_PUSHBUTTON,
            110, 340, 90, 30, hwnd, (HMENU)2, NULL, NULL);

        CreateWindowW(L"BUTTON", L"Поиск",
            WS_CHILD | WS_VISIBLE | BS_PUSHBUTTON,
            210, 340, 90, 30, hwnd, (HMENU)3, NULL, NULL);

        CreateWindowW(L"BUTTON", L"Добавить",
            WS_CHILD | WS_VISIBLE | BS_PUSHBUTTON,
            310, 340, 90, 30, hwnd, (HMENU)4, NULL, NULL);

        CreateWindowW(L"BUTTON", L"Помощь",
            WS_CHILD | WS_VISIBLE | BS_PUSHBUTTON,
            410, 340, 90, 30, hwnd, (HMENU)5, NULL, NULL);

        // Создание сотрудников
        auto dev1 = std::make_shared<Person>("Алексей", "Java", "Ведущий разработчик", 3000.0);
        auto dev2 = std::make_shared<Person>("Мария", "Python", "Разработчик", 2200.0);
        auto dev3 = std::make_shared<Person>("Олег", "Python", "Младший разработчик", 1500.0);
        auto dev4 = std::make_shared<Person>("Ирина", "C++", "Ведущий разработчик", 3200.0);
        auto designer1 = std::make_shared<Person>("Ольга", "Figma", "UI/UX дизайнер", 2000.0);
        auto designer2 = std::make_shared<Person>("Петр", "Sketch", "UI/UX дизайнер", 1800.0);

        // Создание отделов
        auto backendTeam = std::make_shared<Department>("Команда бэкенда");
        auto frontendTeam = std::make_shared<Department>("Команда фронтенда");
        auto aiTeam = std::make_shared<Department>("Команда ИИ");
        auto itDepartment = std::make_shared<Department>("IT Департамент");
        company = std::make_shared<Department>("Вся Компания");

        // Сборка иерархии
        backendTeam->add(dev1);
        backendTeam->add(dev2);
        frontendTeam->add(designer1);
        frontendTeam->add(designer2);
        aiTeam->add(dev3);
        aiTeam->add(dev4);
        itDepartment->add(backendTeam);
        itDepartment->add(frontendTeam);
        itDepartment->add(aiTeam);
        company->add(itDepartment);

        SetWindowTextW(hOutput, L"СИСТЕМА УПРАВЛЕНИЯ ОРГСТРУКТУРОЙ\r\n\r\nНажмите кнопку для выполнения действия.\r\n\r\n");
        break;
    }

    case WM_COMMAND: {
        int wmId = LOWORD(wParam);
        int wmEvent = HIWORD(wParam);

        if (wmEvent == BN_CLICKED || wmEvent == 0) {
            // Получение текста из поля ввода
            wchar_t inputText[1000] = L"";
            GetWindowTextW(hInput, inputText, 1000);

            std::string input;
            if (inputText[0] != L'\0') {
                int size_needed = WideCharToMultiByte(CP_UTF8, 0, inputText, -1, NULL, 0, NULL, NULL);
                input.resize(size_needed - 1);
                WideCharToMultiByte(CP_UTF8, 0, inputText, -1, &input[0], size_needed, NULL, NULL);
            }

            std::string result;
            std::wstring buttonName;

            // Обработка нажатий кнопок
            switch (wmId) {
            case 1:
                result = processCommand("structure");
                buttonName = L"Структура";
                break;
            case 2:
                result = processCommand("budget");
                buttonName = L"Бюджет";
                break;
            case 3:
                result = processCommand("find", input);
                buttonName = L"Поиск";
                break;
            case 4:
                result = processCommand("add", input);
                buttonName = L"Добавить";
                break;
            case 5:
                result = processCommand("help");
                buttonName = L"Помощь";
                break;
            }

            // Вывод результата в окно
            wchar_t currentText[10000] = L"";
            GetWindowTextW(hOutput, currentText, 10000);
            std::wstring newText = std::wstring(currentText) + L"\r\n[ " + buttonName + L" ]\r\n" + stringToWide(result) + L"\r\n";

            SetWindowTextW(hOutput, newText.c_str());
            SetWindowTextW(hInput, L"");

            // Прокрутка вниз
            int len = GetWindowTextLengthW(hOutput);
            SendMessageW(hOutput, EM_SETSEL, len, len);
            SendMessageW(hOutput, EM_SCROLLCARET, 0, 0);
        }
        break;
    }

    case WM_DESTROY:
        PostQuitMessage(0);
        return 0;
    }
    return DefWindowProcW(hwnd, uMsg, wParam, lParam);
}

// Точка входа приложения
int WINAPI wWinMain(HINSTANCE hInstance, HINSTANCE, LPWSTR, int nCmdShow) {
    // Инициализация элементов управления
    INITCOMMONCONTROLSEX icex;
    icex.dwSize = sizeof(INITCOMMONCONTROLSEX);
    icex.dwICC = ICC_STANDARD_CLASSES;
    InitCommonControlsEx(&icex);

    // Регистрация класса окна
    WNDCLASSEXW wc = {};
    wc.cbSize = sizeof(WNDCLASSEXW);
    wc.lpfnWndProc = WindowProc;
    wc.hInstance = hInstance;
    wc.lpszClassName = L"CompanyManager";
    wc.hbrBackground = (HBRUSH)(COLOR_WINDOW + 1);
    RegisterClassExW(&wc);

    // Создание окна
    HWND hwnd = CreateWindowExW(0, L"CompanyManager", L"Управление оргструктурой",
        WS_OVERLAPPEDWINDOW, CW_USEDEFAULT, CW_USEDEFAULT, 620, 450,
        NULL, NULL, hInstance, NULL);

    if (!hwnd) return 0;

    ShowWindow(hwnd, nCmdShow);
    UpdateWindow(hwnd);

    // Цикл обработки сообщений
    MSG msg;
    while (GetMessage(&msg, NULL, 0, 0)) {
        TranslateMessage(&msg);
        DispatchMessage(&msg);
    }

    return 0;
}
