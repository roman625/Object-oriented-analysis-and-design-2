// БИЗНЕС-ЛОГИКА: Иерархия классов транспорта


// Абстрактный базовый класс для всех типов транспорта
// Реализует шаблонный метод и общие свойства
public abstract class Transport
{
    // Общие свойства (доступны для чтения извне, для записи — только в классе и наследниках)
    public int MaxWeight { get; protected set; }      // Максимальная грузоподъёмность (кг)
    public int CountWheel { get; protected set; }     // Количество колёс
    public int PassengerPlace { get; protected set; } // Количество пассажирских мест

    // Абстрактные методы — обязаны быть реализованы в каждом наследнике
    public abstract string Move(); // Описание способа движения
    public abstract string GetInfo(); // Строка с полной информацией
    public abstract bool CanHandle(int weight, int distance, int passengers); // Проверка возможности перевозки
}

// Класс Велосипед — наследник Transport
public class Bicycle : Transport
{
    // Уникальное свойство велосипеда
    public int CountSpeed { get; private set; } // Скорость движения (км/ч)

    public Bicycle()
    {
        // Инициализация характеристик велосипеда
        MaxWeight = 100;
        CountWheel = 2;
        PassengerPlace = 1;
        CountSpeed = 15;
    }

    public override string Move()
    {
        return $"Велосипед двигается со скоростью {CountSpeed} км/ч";
    }

    public override string GetInfo()
    {
        return $"Велосипед: Макс. вес - {MaxWeight}кг, Места - {PassengerPlace}, Скорость - {CountSpeed} км/ч";
    }

    // Логика проверки: подходит ли велосипед под заданные параметры
    public override bool CanHandle(int weight, int distance, int passengers)
    {
        return weight <= 50 && distance <= 20 && passengers <= 1;
    }
}

// Класс Автомобиль — наследник Transport
public class Car : Transport
{
    // Уникальное свойство автомобиля
    public int HorsePw { get; private set; } // Мощность двигателя (л.с.)

    public Car()
    {
        // Инициализация характеристик автомобиля
        MaxWeight = 2000;
        CountWheel = 4;
        PassengerPlace = 5;
        HorsePw = 150;
    }

    public override string Move()
    {
        return $"Автомобиль двигается мощностью {HorsePw} л.с.";
    }

    public override string GetInfo()
    {
        return $"Автомобиль: Макс. вес - {MaxWeight}кг, Места - {PassengerPlace}, Мощность - {HorsePw} л.с.";
    }

    // Логика проверки для автомобиля
    public override bool CanHandle(int weight, int distance, int passengers)
    {
        return weight <= 1500 && passengers <= 5;
    }
}

// Класс Дрон (БПЛА) — наследник Transport
public class Drone : Transport
{
    // Уникальные свойства дрона
    public bool CanFly { get; private set; }   // Флаг: способность летать
    public int MaxAltitude { get; private set; } // Максимальная высота полёта (м)

    public Drone()
    {
        // Инициализация характеристик дрона
        MaxWeight = 10;
        CountWheel = 0;  // У дронов нет колёс в классическом понимании
        PassengerPlace = 0; // Дрон не перевозит людей
        CanFly = true;
        MaxAltitude = 500;
    }

    public override string Move()
    {
        return $"Дрон летит на высоте до {MaxAltitude}м";
    }

    public override string GetInfo()
    {
        return $"Дрон: Макс. вес - {MaxWeight}кг, Полет - {CanFly}, Макс. высота - {MaxAltitude}м";
    }

    // Логика проверки для дрона (только лёгкие грузы, без пассажиров)
    public override bool CanHandle(int weight, int distance, int passengers)
    {
        return weight <= 5 && distance <= 10 && passengers == 0;
    }
}


// ПАТТЕРН FACTORY METHOD: Создание объектов транспорта


// Абстрактный создатель (Creator) — определяет интерфейс для создания транспорта
public abstract class Creator
{
    // Абстрактный фабричный метод — реализуется в конкретных создателях
    protected abstract Transport CreateTransport(int weight, int distance, int passengers);

    // Публичный метод для вызова фабричного метода извне
    public Transport CreateTransportPublic(int weight, int distance, int passengers)
    {
        return CreateTransport(weight, distance, passengers);
    }

    // Альтернативное имя метода для удобства использования
    public Transport GetTransport(int weight, int distance, int passengers)
    {
        return CreateTransport(weight, distance, passengers);
    }
}

// Конкретный создатель для Велосипеда
public class BicycleCreator : Creator
{
    protected override Transport CreateTransport(int weight, int distance, int passengers)
    {
        return new Bicycle();
    }
}

// Конкретный создатель для Автомобиля
public class CarCreator : Creator
{
    protected override Transport CreateTransport(int weight, int distance, int passengers)
    {
        return new Car();
    }
}

// Конкретный создатель для Дрона
public class DroneCreator : Creator
{
    protected override Transport CreateTransport(int weight, int distance, int passengers)
    {
        return new Drone();
    }
}

// Конкретная фабрика (Concrete Creator) — выбирает подходящий транспорт по критериям
public class TransportFactory : Creator
{
    // Экземпляры конкретных создателей для делегирования
    private BicycleCreator _bicycleCreator = new BicycleCreator();
    private CarCreator _carCreator = new CarCreator();
    private DroneCreator _droneCreator = new DroneCreator();

    // Реализация фабричного метода с логикой выбора
    protected override Transport CreateTransport(int weight, int distance, int passengers)
    {
        // Приоритет 1: Дрон (малый вес, короткое расстояние, без пассажиров)
        if (weight <= 5 && distance <= 10 && passengers == 0)
        {
            return _droneCreator.CreateTransportPublic(weight, distance, passengers);
        }
        // Приоритет 2: Велосипед (лёгкий груз, один пассажир)
        else if (weight <= 50 && distance <= 20 && passengers <= 1)
        {
            return _bicycleCreator.CreateTransportPublic(weight, distance, passengers);
        }
        // Приоритет 3: Автомобиль (средний/тяжёлый груз, до 5 пассажиров)
        else if (weight <= 1500 && passengers <= 5)
        {
            return _carCreator.CreateTransportPublic(weight, distance, passengers);
        }
        // Если ни один критерий не подошёл
        else
        {
            return null;
        }
    }
}


// UserTab: Класс управления бизнес-логикой и состоянием


public class UserTab
{
    // Поля для хранения текущего транспорта и фабрики
    private Transport _currentTransport;
    private Creator _creator;

    // Кэшированные свойства для быстрого доступа из UI
    public int CountWheel { get; private set; }
    public int PassengerPlace { get; private set; }
    public int CountSpeed { get; private set; }   // Только для Bicycle
    public int HorsePw { get; private set; }      // Только для Car
    public bool Fly { get; private set; }         // Только для Drone

    public UserTab()
    {
        // Инициализация фабрики для создания транспорта
        _creator = new TransportFactory();
    }

    // Метод для консольного ввода критериев (альтернативный интерфейс)
    public void InputCriteriaAndCreateTransport()
    {
        Console.WriteLine("=== Введите критерии доставки ===\n");

        Console.Write("Вес груза (кг): ");
        int weight = int.Parse(Console.ReadLine());

        Console.Write("Расстояние (км): ");
        int distance = int.Parse(Console.ReadLine());

        Console.Write("Количество пассажиров: ");
        int passengers = int.Parse(Console.ReadLine());

        // Создание транспорта через фабрику
        _currentTransport = _creator.GetTransport(weight, distance, passengers);

        // Обновление кэшированных свойств
        UpdateProperties();
    }

    // Внутренний метод: обновление свойств на основе текущего транспорта
    private void UpdateProperties()
    {
        if (_currentTransport != null)
        {
            // Копирование общих свойств
            CountWheel = _currentTransport.CountWheel;
            PassengerPlace = _currentTransport.PassengerPlace;

            // Копирование специфичных свойств с проверкой типа
            if (_currentTransport is Bicycle bicycle)
            {
                CountSpeed = bicycle.CountSpeed;
            }
            else if (_currentTransport is Car car)
            {
                HorsePw = car.HorsePw;
            }
            else if (_currentTransport is Drone drone)
            {
                Fly = drone.CanFly;
            }
        }
    }

    // Метод для вывода информации в консоль (для тестирования)
    public void UseTransport()
    {
        if (_currentTransport != null)
        {
            Console.WriteLine("\n=== Информация о выбранном транспорте ===");
            Console.WriteLine(_currentTransport.GetInfo());
            Console.WriteLine(_currentTransport.Move());

            Console.WriteLine($"\n--- Уникальные атрибуты ---");
            Console.WriteLine($"Колеса: {CountWheel}");
            Console.WriteLine($"Пассажирских мест: {PassengerPlace}");

            // Вывод специфичных атрибутов
            if (_currentTransport is Bicycle)
            {
                Console.WriteLine($"Скорость: {CountSpeed} км/ч");
            }
            else if (_currentTransport is Car)
            {
                Console.WriteLine($"Мощность: {HorsePw} л.с.");
            }
            else if (_currentTransport is Drone)
            {
                Console.WriteLine($"Может летать: {Fly}");
            }
        }
        else
        {
            Console.WriteLine("\nНе удалось создать транспорт для указанных критериев");
        }
    }

    // Публичный метод для GUI: выбор транспорта по параметрам
    public Transport GetSelectedTransport(int weight, int distance, int passengers)
    {
        _currentTransport = _creator.GetTransport(weight, distance, passengers);
        UpdateProperties();
        return _currentTransport;
    }

    // Геттеры для доступа к кэшированным свойствам из Form1
    public int GetCountSpeed() => CountSpeed;
    public int GetHorsePw() => HorsePw;
    public bool GetCanFly() => Fly;

    // Безопасное получение MaxAltitude (может быть null, если не Drone)
    public int GetMaxAltitude() => (_currentTransport as Drone)?.MaxAltitude ?? 0;
}
